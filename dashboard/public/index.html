<!DOCTYPE html>
<html lang="en" data-theme="classic">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ccffcc" id="meta-theme-color" />
  <meta name="description" content="Vigila moderation dashboard" />
  <title>Vigila Dashboard</title>

  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <!-- Login screen -->
  <div id="login-screen" class="login-screen hidden">
    <div class="login-card glass">
      <div class="login-logo">
        <img src="/icons/icon.svg" alt="Vigila" width="72" height="72" />
        <h1 class="brand-title">Vigila</h1>
        <p class="login-subtitle">Moderation Dashboard</p>
      </div>
      <p id="login-error" class="login-error hidden"></p>
      <a id="login-btn" href="/api/auth/login" class="btn btn-primary btn-discord">
        <svg class="discord-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/>
        </svg>
        Login with Discord
      </a>
    </div>
  </div>

  <!-- App shell -->
  <div id="app" class="app hidden">
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <img src="/icons/icon.svg" alt="Vigila" class="sidebar-logo" />
        <span class="sidebar-title brand-title">Vigila</span>
        <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar">
          <span></span><span></span><span></span>
        </button>
      </div>

      <ul class="nav-list" id="nav-list">
        <li><a class="nav-link" data-route="dashboard" href="#/dashboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          <span>Dashboard</span>
        </a></li>
        <li><a class="nav-link" data-route="warnings" href="#/warnings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          <span>Verbal Warnings</span>
        </a></li>
        <li><a class="nav-link" data-route="polls" href="#/polls">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          <span>Polls</span>
        </a></li>
        <li><a class="nav-link" data-route="templates" href="#/templates">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          <span>Poll Templates</span>
        </a></li>
        <li><a class="nav-link" data-route="auttaja" href="#/auttaja">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span>Auttaja History</span>
        </a></li>
        <li><a class="nav-link" data-route="utility" href="#/utility">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 010 14.14M4.93 4.93a10 10 0 000 14.14"/></svg>
          <span>Utility</span>
        </a></li>
      </ul>

      <div class="sidebar-footer">
        <div class="user-info" id="user-info">
          <img id="user-avatar" class="user-avatar" src="" alt="Avatar" />
          <span id="user-name" class="user-name">Loading…</span>
        </div>
        <div class="sidebar-actions">
          <button class="icon-btn" id="theme-btn" title="Change theme" aria-label="Change theme">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          </button>
          <button class="icon-btn" id="logout-btn" title="Logout" aria-label="Logout">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
          </button>
        </div>
      </div>
    </nav>

    <main class="main-content" id="main-content">
      <header class="topbar">
        <h2 class="page-title" id="page-title">Dashboard</h2>
      </header>
      <div class="page-body" id="page-body">
        <div class="loader-wrap"><div class="loader"></div></div>
      </div>
    </main>
  </div>

  <!-- Theme picker modal -->
  <div id="theme-modal" class="modal-backdrop hidden" role="dialog" aria-modal="true" aria-label="Theme picker">
    <div class="modal-box glass">
      <div class="modal-header">
        <h3>Choose Theme</h3>
        <button class="icon-btn modal-close" id="theme-modal-close" aria-label="Close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="theme-grid" id="theme-grid">
        <button class="theme-swatch active" data-theme="classic" title="Classic">
          <span class="swatch-color" style="background:#ccffcc"></span>
          <span>Classic</span>
        </button>
        <button class="theme-swatch" data-theme="notgreen1" title="Not green 1">
          <span class="swatch-color" style="background:#ffcccc"></span>
          <span>Not green 1</span>
        </button>
        <button class="theme-swatch" data-theme="notgreen2" title="Not green 2">
          <span class="swatch-color" style="background:#ccccff"></span>
          <span>Not green 2</span>
        </button>
        <button class="theme-swatch" data-theme="notgreen3" title="Not green 3">
          <span class="swatch-color" style="background:#ffffcc"></span>
          <span>Not green 3</span>
        </button>
        <button class="theme-swatch" data-theme="notgreen4" title="Not green 4">
          <span class="swatch-color" style="background:#ffccff"></span>
          <span>Not green 4</span>
        </button>
        <button class="theme-swatch" data-theme="notgreen5" title="Not green 5">
          <span class="swatch-color" style="background:#ccffff"></span>
          <span>Not green 5</span>
        </button>
        <button class="theme-swatch" data-theme="white" title="Really really light green">
          <span class="swatch-color" style="background:#ffffff;border:1px solid #ddd"></span>
          <span>Really really light green</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Generic modal -->
  <div id="modal-backdrop" class="modal-backdrop hidden" role="dialog" aria-modal="true">
    <div class="modal-box glass" id="modal-box">
      <div class="modal-header">
        <h3 id="modal-title"></h3>
        <button class="icon-btn modal-close" id="modal-close" aria-label="Close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container" aria-live="polite"></div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
