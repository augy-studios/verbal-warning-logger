# /etc/nginx/sites-available/vigila-dashboard
# Symlink to sites-enabled: ln -s /etc/nginx/sites-available/vigila-dashboard /etc/nginx/sites-enabled/

server {
    listen 80;
    listen [::]:80;
    server_name dash.vigila.augystudios.com;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dash.vigila.augystudios.com;

    # ── SSL (Certbot will manage these paths) ───────────────────
    ssl_certificate     /etc/letsencrypt/live/dash.vigila.augystudios.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dash.vigila.augystudios.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security Headers ────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), camera=(), microphone=()" always;

    # ── Static Files ────────────────────────────────────────────
    # IMPORTANT: Update this path to where you deploy the dashboard
    root /opt/vigila/dashboard/public;

    # Gzip compression
    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache static assets
    location ~* \.(css|js|svg|png|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Service worker — never cache it
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Manifest
    location = /manifest.json {
        add_header Cache-Control "no-cache";
    }

    # ── API Proxy ───────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;

        # Disable buffering for streaming responses
        proxy_buffering off;
    }

    # ── SPA Fallback ────────────────────────────────────────────
    # All other routes → index.html (client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
